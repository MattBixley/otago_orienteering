---
layout: default
---
<article class="page">
  {% unless page.hide_title %}
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </header>
  {% endunless %}
  <div class="prose">
    {{ content }}
  </div>
</article>
