title: Otago Orienteering
tagline: Find your way in the wild places of Otago
description: >-
  Otago Orienteering Club (formerly Dunedin Orienteering Club) — events,
  results, resources and everything you need to start orienteering in Otago,
  New Zealand.
email: committee@dunedinorienteering.org
url: "https://mattbixley.github.io"
baseurl: "/otago_orienteering"
locale: en_NZ

# Plugins (must be listed here for GitHub Pages safe mode to load them)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Build
markdown: kramdown
permalink: pretty
timezone: Pacific/Auckland
# Publish future-dated docs — upcoming events are by definition in the future
future: true

# Collections
collections:
  events:
    output: true
    permalink: /events/:path/
  results:
    output: true
    permalink: /results/:path/

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: events
    values:
      layout: event
  - scope:
      path: ""
      type: results
    values:
      layout: result

# Navigation (edit here to change the top menu)
nav:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Events
    url: /events/
  - title: Results
    url: /results/
  - title: Gallery
    url: /gallery/
  - title: Resources
    url: /resources/
  - title: Policy
    url: /policy/
  - title: Contact
    url: /contact/

# Social / club
# Paste the club Google Calendar public/subscribe URL here to switch the events
# page from a placeholder to a real "Subscribe" button. Leave blank until known.
calendar_url: ""

social:
  facebook: https://www.facebook.com/COOrienteering/
  google_group: https://groups.google.com/g/otagoorienteering
  onz: https://www.orienteering.org.nz/

exclude:
  - README.md
  - EVENTS.md
  - Gemfile
  - Gemfile.lock
  - ooweb_refactor.md
  - _research/
  - _reviews/
  - vendor/
  - .github/
