<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">Otago<strong>Orienteering</strong></span>
    </a>
    <button class="nav-toggle" aria-controls="site-nav" aria-expanded="false">
      <span class="sr-only">Menu</span>
      <span class="nav-toggle-bar" aria-hidden="true"></span>
    </button>
    <nav class="site-nav" id="site-nav" aria-label="Primary">
      <ul>
        {% for item in site.nav %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
    <form class="site-search" role="search"
          action="{{ '/search/' | relative_url }}" method="get"
          data-endpoint="{{ '/search.json' | relative_url }}">
      <label class="sr-only" for="site-search-input">Search the site</label>
      <input type="search" id="site-search-input" name="q" placeholder="Search…"
             autocomplete="off" aria-controls="search-results" aria-expanded="false">
      <ul class="search-results" id="search-results" role="listbox" aria-label="Search results"></ul>
    </form>
  </div>
</header>
<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var nav = document.getElementById('site-nav');
    btn && btn.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
    });

    // ── Live search dropdown ──────────────────────────────
    var form = document.querySelector('.site-search');
    if (!form) return;
    var input = form.querySelector('input[type="search"]');
    var out = form.querySelector('.search-results');
    var endpoint = form.getAttribute('data-endpoint');
    var docs = null, loading = false, active = -1;

    function load() {
      if (docs || loading) return;
      loading = true;
      fetch(endpoint).then(function (r) { return r.json(); })
        .then(function (d) { docs = d; render(input.value); })
        .catch(function () { docs = []; });
    }
    function score(d, q) {
      var t = (d.title || '').toLowerCase();
      if (t.indexOf(q) === 0) return 3;
      if (t.indexOf(q) > -1) return 2;
      if ((d.tags || '').toLowerCase().indexOf(q) > -1) return 1.5;
      if ((d.content || '').toLowerCase().indexOf(q) > -1) return 1;
      return 0;
    }
    function render(q) {
      q = (q || '').trim().toLowerCase();
      active = -1;
      if (!q || !docs) { close(); return; }
      var hits = docs.map(function (d) { return { d: d, s: score(d, q) }; })
        .filter(function (x) { return x.s > 0; })
        .sort(function (a, b) { return b.s - a.s; })
        .slice(0, 8);
      if (!hits.length) {
        out.innerHTML = '<li class="r-empty">No matches for “' + q.replace(/</g, '') + '”</li>';
      } else {
        out.innerHTML = hits.map(function (x) {
          return '<li role="option"><a href="' + x.d.url + '">' +
                 '<span class="r-kind">' + x.d.kind + '</span>' + x.d.title + '</a></li>';
        }).join('');
      }
      out.classList.add('is-open');
      input.setAttribute('aria-expanded', 'true');
    }
    function close() {
      out.classList.remove('is-open');
      out.innerHTML = '';
      input.setAttribute('aria-expanded', 'false');
    }
    function items() { return out.querySelectorAll('a'); }
    function setActive(i) {
      var links = items(); if (!links.length) return;
      active = (i + links.length) % links.length;
      links.forEach(function (a, n) { a.classList.toggle('is-active', n === active); });
    }

    input.addEventListener('focus', load);
    input.addEventListener('input', function () { render(input.value); });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'ArrowDown') { e.preventDefault(); setActive(active + 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(active - 1); }
      else if (e.key === 'Enter') {
        var links = items();
        if (active > -1 && links[active]) { e.preventDefault(); window.location = links[active].href; }
        // otherwise the form submits to the /search/ page
      } else if (e.key === 'Escape') { close(); input.blur(); }
    });
    document.addEventListener('click', function (e) {
      if (!form.contains(e.target)) close();
    });
  })();
</script>
