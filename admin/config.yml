# Decap CMS configuration — the admin interface for non-technical editors.
#
# Backend options (pick one when going live):
#   1. github  — editors log in with a GitHub account. Simplest for a small
#                trusted committee. Requires an OAuth app (or a proxy like
#                https://github.com/sveltia/sveltia-cms-auth on Cloudflare).
#   2. git-gateway (Netlify Identity) — invite editors by email, no GitHub
#                account needed. Best for less technical volunteers.
#
# This draft uses the github backend against the main branch.

backend:
  name: github
  repo: MattBixley/otago_orienteering   # change to the club's org/repo when handed over
  branch: main
  # Auth helper that performs the GitHub OAuth token exchange. REQUIRED for
  # login on the LIVE site to work. Deploy sveltia-cms-auth (Cloudflare Worker)
  # and paste its URL here (no trailing slash). Full instructions: see OAuth.md.
  # base_url: https://<your-auth-worker>.workers.dev
  # Editorial workflow gives Draft → In review → Ready, so changes can be
  # checked before they go live. Great for a multi-editor committee.
  # publish_mode: editorial_workflow

# LOCAL TEST MODE — lets a committee member trial the CMS (add an event,
# post results, edit a page) with NO OAuth worker and NO GitHub login.
# How to test:
#   1. In the repo root run:  npx @sveltia/cms-proxy-server
#   2. Serve the site:        bundle exec jekyll serve
#   3. Open http://localhost:4000/otago_orienteering/admin/
# Sveltia detects the proxy and reads/writes local files directly.
# This flag is ignored on the deployed GitHub Pages site (not localhost),
# so it is safe to leave on — the live site still uses the github backend above.
local_backend: true

media_folder: "assets/img/uploads"
public_folder: "/otago_orienteering/assets/img/uploads"

# Show editors a live preview link
site_url: https://mattbixley.github.io/otago_orienteering

collections:
  - name: events
    label: "Events"
    label_singular: "Event"
    folder: "_events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date | date('DD MMM YYYY')}} — {{title}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Event name", widget: string }
      - { name: date, label: "Date", widget: datetime, format: "YYYY-MM-DD", date_format: "DD MMM YYYY", time_format: false }
      - { name: start_time, label: "Start time", widget: string, required: false, hint: "e.g. 10:00am start, register from 9:30am" }
      - { name: event_type, label: "Event type", widget: select, options: ["OY Classic", "Sprint", "Summer/Schools Series", "Rogaine", "MTBO", "Night", "Championship", "Ski", "Other"], default: "OY Classic" }
      - { name: location, label: "Location", widget: string }
      - { name: grade, label: "Courses / grades", widget: string, required: false }
      - { name: cost, label: "Cost", widget: string, required: false, default: "Members free, casuals $10, under-16 $5" }
      - { name: registration, label: "Registration link", widget: string, required: false }
      - { name: map_url, label: "Map link", widget: string, required: false }
      - { name: results, label: "Results page path", widget: string, required: false, hint: "Link once results are up, e.g. /results/2026/..." }
      - { name: body, label: "Full description", widget: markdown }

  - name: results
    label: "Results"
    label_singular: "Result"
    folder: "_results"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{date | date('YYYY')}} — {{title}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Event name", widget: string }
      - { name: date, label: "Date", widget: datetime, format: "YYYY-MM-DD", date_format: "DD MMM YYYY", time_format: false }
      - { name: year, label: "Year", widget: number, value_type: int, hint: "Used to group results, e.g. 2026" }
      - { name: event_type, label: "Event type", widget: select, options: ["OY Classic", "Sprint", "Summer/Schools Series", "Rogaine", "MTBO", "Night", "Championship", "Ski", "Other"], default: "OY Classic" }
      - { name: event, label: "Event page path", widget: string, required: false }
      - name: files
        label: "Result files"
        widget: list
        required: false
        fields:
          - { name: label, label: "Label", widget: string }
          - { name: url, label: "File / link", widget: string }
      - { name: body, label: "Notes", widget: markdown, required: false }

  - name: pages
    label: "Pages"
    editor: { preview: false }
    files:
      - name: about
        label: "About"
        file: "about.md"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: subtitle, label: Subtitle, widget: string, required: false }
          - { name: body, label: Body, widget: markdown }
      - name: policy
        label: "Policy"
        file: "policy/index.md"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: body, label: Body, widget: markdown }
      - name: resources
        label: "Resources"
        file: "resources.md"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: body, label: Body, widget: markdown }
      - name: contact
        label: "Contact"
        file: "contact.md"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: body, label: Body, widget: markdown }
